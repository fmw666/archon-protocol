# Archon Protocol Project Configuration
# Fill this file with your project's specific tech choices.
# Rules reference these values for context-sensitive behavior.

# ─── Execution Environment ───────────────────────────────────────
# Detected or confirmed during /archon-init.
# Determines deploy paths, available capabilities, and invocation syntax.
environment:
  tool: "" # cursor | claude-code | codex | copilot | windsurf | gemini-cli | other
  agents_supported: false # true for cursor, claude-code
  agents_dir: "" # .cursor/agents | .claude/agents | (empty if no agent support)
  skills_dir: "" # .cursor/skills | .claude/skills | .codex/skills
  rules_file: "" # .cursor/rules/*.md | CLAUDE.md | .windsurfrules | (empty)
  sub_agents: false # true if tool can invoke sub-agents with isolated context
  constraint_preload: false # true if tool supports `skills:` field in agent frontmatter

# ─── Project ─────────────────────────────────────────────────────
project:
  name: ""
  language: "javascript" # javascript | typescript | python | go | rust
  framework: "" # next | react | vue | express | django | fastapi | none

i18n:
  enabled: false
  library: "" # next-intl | react-intl | i18next | none
  locales: [] # ["en", "zh", "ja"]

state:
  library: "" # redux | zustand | pinia | none
  data_fetching: "" # rtk-query | tanstack-query | swr | none

testing:
  runner: "vitest" # vitest | jest | pytest | go-test
  test_dir_pattern: "__tests__" # __tests__ | tests | spec
  test_file_pattern: "*.test.{js,ts}" # *.test.js | *.spec.ts

docs:
  performance_lessons: "" # path to performance lessons doc (e.g. docs/performance-lessons.md)
  architecture: "" # path to architecture doc

conventions:
  commit_format: "conventional" # conventional | angular | none
  max_file_lines:
    page: 350
    component: 300
    hook: 200
    utility: 200
    api_route: 150
