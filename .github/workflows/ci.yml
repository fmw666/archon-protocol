name: Archon Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Link audit
        run: node scripts/lint-links.mjs
      - name: Integrity invariants
        run: node scripts/lint-integrity.mjs
      - name: Tests
        run: npm test
